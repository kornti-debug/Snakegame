<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Snake Memory — Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a1a;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      overscroll-behavior: none;
    }
    #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    #status {
      padding: 14px 16px;
      font-size: 14px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff4444;
      transition: background 0.2s;
    }
    #status-dot.connected { background: #44ff44; }
    #status-text { flex: 1; }
    #join-screen, #controller, #error-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    #join-screen h1, #error-screen h1 {
      font-size: 32px; margin-bottom: 8px; text-align: center;
    }
    #join-screen p, #error-screen p {
      font-size: 16px; opacity: 0.6; margin-bottom: 32px; text-align: center;
    }
    #name-input {
      width: 100%; max-width: 360px;
      padding: 14px 16px; font-size: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      margin-bottom: 16px;
      font-family: inherit;
    }
    #join-btn {
      padding: 16px 48px; font-size: 20px; font-weight: bold;
      background: #44aaff; color: #0a0a1a;
      border: none; border-radius: 10px;
      cursor: pointer; font-family: inherit;
    }
    #join-btn:disabled { opacity: 0.5; }
    #controller {
      padding: 0; flex-direction: row; gap: 4px;
      background: #000;
    }
    .pad {
      flex: 1; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 96px; font-weight: bold;
      background: rgba(68, 170, 255, 0.08);
      border: 2px solid rgba(68, 170, 255, 0.3);
      border-radius: 14px;
      transition: background 0.08s;
    }
    .pad.active { background: rgba(68, 255, 68, 0.35); border-color: #44ff44; }
    #error-screen { display: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <div id="status">
      <div id="status-dot"></div>
      <div id="status-text">Connecting…</div>
    </div>
    <div id="join-screen">
      <h1>Snake Memory</h1>
      <p>Join the game as a player</p>
      <input id="name-input" placeholder="Your name" maxlength="16" />
      <button id="join-btn" disabled>Join</button>
    </div>
    <div id="controller" class="hidden">
      <div class="pad" id="pad-left">◀</div>
      <div class="pad" id="pad-right">▶</div>
    </div>
    <div id="error-screen">
      <h1>Can't join</h1>
      <p id="error-msg"></p>
    </div>
  </div>
  <script type="module" src="/src/phone.ts"></script>
</body>
</html>
