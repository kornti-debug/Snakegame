<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="x5-orientation" content="landscape" />
  <title>Snake Memory — Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a1a;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      overscroll-behavior: none;
    }
    #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

    /* ---- Rotate-to-landscape hint ---- */
    #rotate-hint {
      display: none;
      position: fixed; inset: 0;
      background: #0a0a1a;
      z-index: 1000;
      align-items: center; justify-content: center; flex-direction: column;
      padding: 24px; text-align: center;
    }
    @media (orientation: portrait) {
      #rotate-hint { display: flex; }
    }
    /* Allow portrait on the Join screen — it has a text field that's
       much easier to use upright. Landscape is only required from the
       Settings screen onward. */
    body.allow-portrait #rotate-hint { display: none !important; }
    #rotate-hint .icon {
      width: 72px; height: 120px;
      border: 3px solid #44aaff; border-radius: 10px;
      margin-bottom: 20px;
      position: relative;
      animation: rotateHint 1.8s ease-in-out infinite;
    }
    @keyframes rotateHint {
      0%, 40%   { transform: rotate(0deg); }
      60%, 100% { transform: rotate(-90deg); }
    }
    #rotate-hint h1 { font-size: 22px; margin-bottom: 8px; }
    #rotate-hint p  { font-size: 14px; opacity: 0.6; max-width: 320px; }

    /* ---- Status bar ---- */
    #status {
      padding: 8px 14px;
      font-size: 13px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff4444;
      transition: background 0.2s;
    }
    #status-dot.connected { background: #44ff44; }
    #status-text { font-size: 12px; }
    /* In-game HUD lives inside the status bar so the arena canvas below
       keeps the full real estate. Each item hides until relevant. */
    #hud-bar {
      flex: 1;
      display: none;
      align-items: center;
      gap: 12px;
      overflow: hidden;
      min-width: 0;
    }
    #hud-bar.visible { display: flex; }
    #status-text.hidden { display: none; }
    #hud-bar .hud-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }
    #hud-bar .hud-item.flex { flex: 1; min-width: 0; }
    #hud-bar .hud-item .label {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
      color: rgba(136, 221, 255, 0.55);
    }
    #hud-bar .hud-item .value {
      font-size: 12px; font-weight: bold;
      overflow: hidden; text-overflow: ellipsis;
    }
    #hud-bar .hud-item .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    #leave-btn {
      display: none;
      padding: 5px 12px; font-size: 12px;
      background: rgba(255, 68, 68, 0.15);
      border: 1px solid rgba(255, 68, 68, 0.4);
      color: #ff8888;
      border-radius: 6px;
      font-family: inherit;
    }
    #leave-btn.visible { display: inline-block; }
    #fs-btn {
      padding: 5px 10px; font-size: 14px;
      background: rgba(136, 221, 255, 0.1);
      border: 1px solid rgba(136, 221, 255, 0.3);
      color: #88ddff;
      border-radius: 6px;
      font-family: inherit;
      line-height: 1;
    }
    #fs-btn.hidden { display: none; }

    .screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    .screen.active { display: flex; }

    /* ---- Join screen (centered card) ---- */
    #join-screen { align-items: center; justify-content: center; padding: 20px; }
    #join-screen h1 { font-size: 28px; margin-bottom: 6px; }
    #join-screen p { font-size: 14px; opacity: 0.55; margin-bottom: 20px; text-align: center; }
    #name-input {
      width: 100%; max-width: 360px;
      padding: 12px 14px; font-size: 17px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      margin-bottom: 14px;
      font-family: inherit;
    }
    #join-btn {
      padding: 14px 44px; font-size: 18px; font-weight: bold;
      background: #44aaff; color: #0a0a1a;
      border: none; border-radius: 10px;
      font-family: inherit;
    }
    #join-btn:disabled { opacity: 0.5; }

    /* ---- Settings (landscape: 2-column) ---- */
    #settings-screen {
      flex-direction: row;
      padding: 12px;
      gap: 12px;
    }
    #settings-screen .col {
      flex: 1; display: flex; flex-direction: column; gap: 8px;
      overflow-y: auto;
      padding: 4px;
    }
    .settings-block {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(68, 170, 255, 0.25);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .settings-block h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1.3px;
      color: rgba(136, 221, 255, 0.7); margin-bottom: 8px; font-weight: normal;
    }
    .big-label {
      font-size: 20px; font-weight: bold;
    }
    .big-label .slot { color: #88ddff; }
    #settings-name {
      width: 100%;
      padding: 10px 12px; font-size: 15px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
    }
    .swatch-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .swatch {
      width: 34px; height: 34px; border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.15);
      transition: transform 0.08s, border-color 0.08s;
    }
    .swatch.selected {
      border-color: #fff;
      transform: scale(1.08);
    }
    .swatch.taken {
      opacity: 0.25;
      position: relative;
    }
    .swatch.taken::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent, transparent 4px,
        rgba(0,0,0,0.5) 4px, rgba(0,0,0,0.5) 6px
      );
      border-radius: 5px;
    }
    .team-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .team-btn {
      padding: 8px 12px; font-size: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
      border-radius: 6px;
      font-family: inherit;
      display: flex; align-items: center; gap: 6px;
    }
    .team-btn .dot { width: 10px; height: 10px; border-radius: 50%; }
    .team-btn.selected {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }
    #settings-hint {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      font-style: italic;
      padding: 6px;
    }
    #ready-btn {
      width: 100%;
      padding: 16px; font-size: 18px; font-weight: bold;
      background: rgba(68, 255, 68, 0.15);
      border: 2px solid rgba(68, 255, 68, 0.55);
      color: #aaffaa;
      border-radius: 10px;
      font-family: inherit;
    }
    #ready-btn.ready {
      background: rgba(68, 255, 68, 0.35);
      border-color: #44ff44;
      color: #fff;
      box-shadow: 0 0 12px rgba(68, 255, 68, 0.5);
    }

    /* ---- Controller (landscape: [pad][info][pad]) ---- */
    #controller-screen {
      flex-direction: row;
      gap: 6px;
      padding: 6px;
      background: #000;
    }
    .pad {
      flex: 1.2; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; font-weight: bold;
      background: rgba(68, 170, 255, 0.08);
      border: 2px solid rgba(68, 170, 255, 0.3);
      border-radius: 12px;
      transition: background 0.08s;
    }
    .pad.active { background: rgba(68, 255, 68, 0.35); border-color: #44ff44; }
    #info-col {
      flex: 2.2;
      display: flex; flex-direction: column;
      padding: 4px;
      color: #fff;
      min-width: 0;
    }
    #arena-canvas {
      flex: 1;
      width: 100%;
      min-height: 0;
      background: #000;
      border: 1px solid rgba(68, 170, 255, 0.25);
      border-radius: 6px;
      display: block;
    }
    #arena-msg {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.4);
      font-size: 12px; text-align: center;
      padding: 12px;
      pointer-events: none;
    }
    #arena-wrap { flex: 1; position: relative; min-height: 0; display: flex; }

    /* ---- Error ---- */
    #error-screen { align-items: center; justify-content: center; padding: 20px; }
    #error-screen h1 { font-size: 24px; margin-bottom: 8px; }
    #error-screen p { font-size: 14px; opacity: 0.55; }
  </style>
</head>
<body>
  <div id="rotate-hint">
    <div class="icon"></div>
    <h1>Rotate your phone</h1>
    <p>Snake Memory plays better in landscape. Turn your phone sideways to continue.</p>
  </div>

  <div id="app">
    <div id="status">
      <div id="status-dot"></div>
      <div id="status-text">Connecting…</div>
      <div id="hud-bar">
        <div class="hud-item flex">
          <span class="dot" id="info-color"></span>
          <span class="value" id="info-name">—</span>
        </div>
        <div class="hud-item">
          <span class="dot" id="info-team-dot"></span>
          <span class="value" id="info-team-name">Solo</span>
        </div>
        <div class="hud-item">
          <span class="label">Pairs</span>
          <span class="value" id="info-score">0</span>
        </div>
      </div>
      <button id="fs-btn" title="Fullscreen">⛶</button>
      <button id="leave-btn">Leave</button>
    </div>

    <div id="join-screen" class="screen active">
      <h1>Snake Memory</h1>
      <p>Join the game as a player</p>
      <input id="name-input" placeholder="Your name" maxlength="16" />
      <button id="join-btn" disabled>Join</button>
    </div>

    <div id="settings-screen" class="screen">
      <div class="col">
        <div class="settings-block">
          <div class="big-label">You are <span class="slot" id="slot-label">Player ?</span></div>
        </div>
        <div class="settings-block">
          <h2>Name</h2>
          <input id="settings-name" maxlength="16" />
        </div>
        <div class="settings-block">
          <h2>Team</h2>
          <div id="team-row" class="team-row"></div>
        </div>
      </div>
      <div class="col">
        <div class="settings-block">
          <h2>Color</h2>
          <div id="color-row" class="swatch-row"></div>
        </div>
        <button id="ready-btn">Tap when Ready</button>
        <div id="settings-hint" class="settings-block">
          host starts the game when all players are ready
        </div>
      </div>
    </div>

    <div id="controller-screen" class="screen">
      <div class="pad" id="pad-left">◀</div>
      <div id="info-col">
        <div id="arena-wrap">
          <canvas id="arena-canvas"></canvas>
          <div id="arena-msg">waiting for game to start…</div>
        </div>
      </div>
      <div class="pad" id="pad-right">▶</div>
    </div>

    <div id="error-screen" class="screen">
      <h1>Can't join</h1>
      <p id="error-msg"></p>
    </div>
  </div>
  <script type="module" src="/src/phone.ts"></script>
</body>
</html>
